<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stratancy</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f8fafc;
      color:#111827;
    }
    header{
      background:#111827;
      color:white;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    select{
      padding:10px;
      border-radius:8px;
      border:none;
    }
    .hero{
      padding:80px 20px;
      text-align:center;
    }
    .hero h1{
      font-size:48px;
      margin-bottom:20px;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
      padding:40px 20px;
    }
    .card{
      background:white;
      padding:24px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }
    .dark{
      background:#111827;
      color:white;
      padding:60px 20px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <strong>Stratancy</strong><br>
    Paris · Dublin · BPO
  </div>

  <div>
    <select id="country">
      <option value="france">🇫🇷 France</option>
      <option value="ireland">🇮🇪 Ireland</option>
    </select>

    <select id="lang">
      <option value="en">EN</option>
      <option value="fr">FR</option>
    </select>
  </div>
</header>

<section class="hero">
  <h1 id="title"></h1>
  <p id="subtitle"></p>
</section>

<section class="cards" id="packages"></section>

<section class="dark">
  <h2 id="bpoTitle"></h2>
  <p id="bpoText"></p>
</section>

<script>
const data = {
  en: {
    title: "Accounting & BPO Services",
    subtitle: "Paris and Dublin accounting firm for French, Irish, UK and Canadian clients.",
    bpoTitle: "BPO Services",
    bpoText: "Finance and accounting outsourcing for UK and Canadian companies.",
    france: [
      ["France Starter","€199/mo"],
      ["France Growth","€399/mo"],
      ["France Premium","Custom"]
    ],
    ireland: [
      ["Ireland Starter","€175/mo"],
      ["Ireland Growth","€350/mo"],
      ["Ireland Premium","Custom"]
    ]
  },
  fr: {
    title: "Services Comptables & BPO",
    subtitle: "Cabinet comptable à Paris et Dublin pour clients français, irlandais, britanniques et canadiens.",
    bpoTitle: "Services BPO",
    bpoText: "Externalisation comptable pour entreprises britanniques et canadiennes.",
    france: [
      ["France Starter","199€/mois"],
      ["France Growth","399€/mois"],
      ["France Premium","Sur devis"]
    ],
    ireland: [
      ["Ireland Starter","175€/mois"],
      ["Ireland Growth","350€/mois"],
      ["Ireland Premium","Sur devis"]
    ]
  }
};

let lang = "en";
let country = "france";

function render(){
  const t = data[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("subtitle").innerText = t.subtitle;
  document.getElementById("bpoTitle").innerText = t.bpoTitle;
  document.getElementById("bpoText").innerText = t.bpoText;

  const packages = document.getElementById("packages");

  packages.innerHTML = t[country].map(p => `
    <div class="card">
      <h3>${p[0]}</h3>
      <p>${p[1]}</p>
    </div>
  `).join("");
}

document.getElementById("country").addEventListener("change",(e)=>{
  country = e.target.value;

  if(country === "france"){
    lang = "fr";
  } else {
    lang = "en";
  }

  document.getElementById("lang").value = lang;

  render();
});

document.getElementById("lang").addEventListener("change",(e)=>{
  lang = e.target.value;
  render();
});

render();
</script>

</body>
</html>
