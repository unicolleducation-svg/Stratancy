<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stratancy | Accounting & BPO</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 24px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-left: 8px;
    }

    .hero {
      padding: 90px 8%;
      text-align: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .hero h1 {
      font-size: 52px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 20px;
      max-width: 760px;
      margin: auto;
      color: #cbd5e1;
    }

    .section {
      padding: 60px 8%;
    }

    .section h2 {
      font-size: 36px;
      text-align: center;
      margin-bottom: 35px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }

    .card h3 {
      font-size: 24px;
      margin-top: 0;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      margin: 20px 0;
      color: #0f172a;
    }

    ul {
      padding-left: 20px;
      line-height: 1.8;
    }

    .address {
      text-align: center;
      font-weight: bold;
      margin-top: 25px;
      color: #475569;
    }

    .cta {
      display: inline-block;
      margin-top: 25px;
      background: white;
      color: #0f172a;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
    }

    footer {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }
  </style>
</head>

<body>

<header>
  <div>
    <strong>Stratancy</strong><br />
    <small>Paris · Dublin · BPO</small>
  </div>

  <div>
    <select id="mode">
      <option value="ireland">Ireland</option>
      <option value="france">France</option>
      <option value="bpo">UK / Canada BPO</option>
    </select>

    <select id="language">
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>
  </div>
</header>

<section class="hero">
  <h1 id="title"></h1>
  <p id="subtitle"></p>
  <br />
  <a href="mailto:contact@stratancy.com" class="cta">Book a Consultation</a>
</section>

<section class="section">
  <h2 id="servicesTitle"></h2>
  <div class="cards" id="services"></div>
  <p class="address" id="address"></p>
</section>

<section class="section">
  <h2 id="pricingTitle"></h2>
  <div class="cards" id="pricing"></div>
</section>

<footer>
  © 2026 Stratancy. Accounting, compliance and finance operations.
</footer>

<script>
const data = {
  ireland: {
    title: "Irish Accounting & Company Formation",
    subtitle: "CRO, Revenue, Corporation Tax, VAT and company formation support for Irish businesses and international founders.",
    servicesTitle: "Ireland Services",
    pricingTitle: "Ireland Pricing",
    address: "31 Brooklawn Wood, Stradbrook Road, Blackrock, Dublin",
    services: [
      "Company Formation",
      "CRO Annual Return B1",
      "Revenue Registration",
      "Corporation Tax",
      "VAT Registration",
      "RBO Filing"
    ],
    pricing: [
      ["Formation Basic", "€249 once-off", ["Irish company incorporation", "CRO registration", "Company constitution", "Email support"]],
      ["Compliance Plus", "€995/year", ["Annual Return B1", "Corporation Tax support", "Revenue registration", "Basic bookkeeping"]],
      ["International Founder", "€2,450+", ["Non-resident setup", "Banking guidance", "Cross-border support", "Dedicated advisor"]]
    ]
  },

  france: {
    title: "Expert-Comptable Paris",
    subtitle: "Comptabilité française pour SASU, SAS, entrepreneurs, professions libérales et dirigeants internationaux.",
    servicesTitle: "Services France",
    pricingTitle: "Forfaits France",
    address: "32 Rue Pradier, Paris 75019",
    services: [
      "Création SASU / SAS",
      "TVA",
      "URSSAF",
      "DSN & Paie",
      "Bilan Comptable",
      "Liasse Fiscale"
    ],
    pricing: [
      ["SASU Essentiel", "79€/mois", ["Tenue comptable", "Déclarations TVA", "Bilan annuel", "Support URSSAF"]],
      ["Société Croissance", "249€/mois", ["Comptabilité complète", "TVA & fiscalité", "Paie salariés", "Tableaux de bord"]],
      ["International France", "Sur devis", ["Support bilingue", "Conseiller dédié", "Gestion multi-pays", "Optimisation fiscale"]]
    ]
  },

  bpo: {
    title: "UK & Canada Finance BPO",
    subtitle: "Outsourced bookkeeping, accounts payable, payroll processing and finance operations for UK and Canadian businesses.",
    servicesTitle: "BPO Services",
    pricingTitle: "BPO Pricing",
    address: "31 Brooklawn Wood, Stradbrook Road, Blackrock, Dublin",
    services: [
      "Bookkeeping Outsourcing",
      "Accounts Payable",
      "Accounts Receivable",
      "Payroll Processing",
      "Management Reporting",
      "Finance Operations"
    ],
    pricing: [
      ["BPO Starter", "From £499/mo", ["Monthly bookkeeping", "Bank reconciliations", "Invoice processing", "Email support"]],
      ["BPO Growth", "From £1,250/mo", ["Dedicated finance associate", "Payroll support", "Management reporting", "AP/AR support"]],
      ["Enterprise BPO", "Custom", ["Dedicated offshore team", "Custom workflows", "Weekly reporting", "CFO support"]]
    ]
  }
};

function render() {
  const mode = document.getElementById("mode").value;
  const d = data[mode];

  document.getElementById("title").innerText = d.title;
  document.getElementById("subtitle").innerText = d.subtitle;
  document.getElementById("servicesTitle").innerText = d.servicesTitle;
  document.getElementById("pricingTitle").innerText = d.pricingTitle;
  document.getElementById("address").innerText = d.address;

  document.getElementById("services").innerHTML = d.services.map(service => `
    <div class="card">
      <h3>${service}</h3>
      <p>Specialist local support for ${d.title}.</p>
    </div>
  `).join("");

  document.getElementById("pricing").innerHTML = d.pricing.map(plan => `
    <div class="card">
      <h3>${plan[0]}</h3>
      <div class="price">${plan[1]}</div>
      <ul>
        ${plan[2].map(item => `<li>${item}</li>`).join("")}
      </ul>
    </div>
  `).join("");
}

document.getElementById("mode").addEventListener("change", render);
render();
</script>

</body>
</html>
